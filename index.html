<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimalist Travel Budget Pro v8.0</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Thai Budget">

    <style>
        /* 全域變數（顏色主題） */
        :root {
            --bg-color: #f0f4f8;   
            --card-bg: #ffffff;    
            --primary: #1abc9c;    
            --danger: #ff4d4f;     
            --success: #2ecc71;    
            --warning: #e67e22;    
            --text: #333333;       
            --grey: #e1e4e8;       
            
            /* Highlight 顏色背景 */
            --hl-flights: #e8f4fd; 
            --hl-flights-txt: #2980b9;
            --hl-stay: #fef5e7;    
            --hl-stay-txt: #d35400;
            --hl-dining: #fdebd0;  
            --hl-dining-txt: #e67e22;
            --hl-shopping: #f5eef8;
            --hl-shopping-txt: #8e44ad;
            --hl-tickets: #e8f8f5; 
            --hl-tickets-txt: #16a085;
            --hl-trans: #ebf5fb;   
            --hl-trans-txt: #566573;
            --hl-insurance: #eaf2f8;
            --hl-insurance-txt: #2471a3;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px; 
            padding-top: 0; 
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 14px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 10px;
        }
        
        .top-sticky-card {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            margin-left: -10px;
            margin-right: -10px;
            margin-bottom: 12px;
            padding: 15px 12px;
            background: linear-gradient(135deg, #ffffff 0%, #f7f9fa 100%);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        
        h2 { margin-top: 0; font-size: 0.9rem; color: #777; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        
        .dashboard-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .total-box {
            flex: 1.1;
            padding-left: 10px; 
            text-align: left;
        }
        .total-amount { 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: var(--primary); 
            margin-top: 2px;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        .total-hkd-sub {
            font-size: 0.8rem;
            color: #888;
            font-weight: 600;
            margin-top: 2px;
        }
        
        .category-totals-box {
            flex: 1.3;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            background: rgba(0, 0, 0, 0.02);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.01);
        }
        
        .cat-total-item {
            display: flex;
            flex-direction: column;
            font-size: 0.75rem;
            color: #555;
        }
        .cat-total-item .cat-name {
            color: #888;
            font-size: 0.7rem;
        }
        .cat-total-item .cat-num {
            font-weight: 700;
            color: #222;
        }
        
        /* 匯率調整區欄位 */
        .fx-rate-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e8f8f5;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #16a085;
        }
        .fx-rate-box input {
            width: 80px;
            padding: 4px 8px;
            margin: 0;
            border-radius: 6px;
            border: 1px solid #a3e4d7;
            text-align: center;
            font-size: 0.85rem;
        }

        input[type="number"], input[type="text"], input[type="date"] {
            width: 100%;
            padding: 10px 12px; 
            margin: 4px 0;      
            border-radius: 8px;
            border: 1px solid var(--grey);
            box-sizing: border-box;
            font-size: 0.95rem;
            -webkit-appearance: none; 
        }
        input:focus { outline: none; border-color: var(--primary); } 
        
        .edit-date-wrapper {
            background: #fafbfc;
            padding: 2px 0;
            margin: 4px 0;
        }
        .edit-date-wrapper label {
            font-size: 0.75rem;
            color: #666;
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }
        
        button {
            width: 100%;
            padding: 11px;
            margin: 4px 0;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.2s;
            -webkit-appearance: none;
            cursor: pointer;
        }
        button:active { opacity: 0.8; } 
        
        .btn-save { background-color: var(--primary); color: white; margin-top: 6px; }
        .btn-backup { background-color: #566573; color: white; margin-top: 6px; }
        
        .category-picker {
            display: flex;
            flex-wrap: wrap; 
            gap: 6px;       
            margin: 8px 0;
        }
        
        .category-btn {
            flex: 1 1 calc(33.33% - 6px); 
            background-color: var(--card-bg);
            color: var(--text);
            border: 1.5px solid var(--grey);
            border-radius: 10px;
            padding: 8px 2px; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 2px;
            margin: 0;
        }
        .category-btn .icon-label { font-size: 1.05rem; } 
        .category-btn .label { font-size: 0.75rem; font-weight: bold; } 
        
        .category-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .edit-mode-indicator {
            display: none; 
            background-color: #f39c12;
            color: white;
            padding: 6px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .list-container { max-height: 280px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f2f5; }
        .list-item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        
        .tag { 
            padding: 3px 8px; 
            border-radius: 5px; 
            font-size: 0.78rem; 
            font-weight: bold; 
            align-self: flex-start; 
        }
        
        .item-details { color: #aaa; font-size: 0.72rem; margin-top: 4px; display: flex; gap: 6px; align-items: center; }
        .note-text { color: #555; font-weight: 500; background: #fffbe6; padding: 1px 4px; border-radius: 4px; border: 1px solid #ffe58f; } 

        .item-right { display: flex; align-items: center; gap: 4px; }
        .amount-zone { display: flex; flex-direction: column; text-align: right; margin-right: 4px; }
        .amount { font-weight: 700; font-size: 0.95rem; color: #222; }
        .amount-hkd { font-size: 0.72rem; color: #888; font-weight: 500; }
        
        .btn-action { background: none; padding: 4px; margin: 0; width: auto; font-size: 0.9rem; display: inline-block;}
        
        @media (min-width: 400px) { .category-btn { flex: 1 1 calc(25% - 6px); } }
    </style>
</head>
<body>

    <div class="card top-sticky-card">
        <div class="dashboard-layout">
            <div class="total-box">
                <h2>Total Expenses</h2>
                <div class="total-amount">฿<span id="total">0</span></div>
                <div class="total-hkd-sub">≈ HK$ <span id="total-hkd">0</span></div>
            </div>
            <div class="category-totals-box" id="category-totals-container"></div>
        </div>
    </div>

    <div class="fx-rate-box">
        <span>Exchange Rate: 1 THB =</span>
        <input type="number" id="fx-rate" value="0.22" step="0.001" onchange="handleRateChange()" inputmode="decimal">
        <span>HKD</span>
    </div>

    <div class="card">
        <h2 id="form-title">Add Travel Record</h2>
        
        <div id="edit-indicator" class="edit-mode-indicator">✏️ Editing trip record...</div>
        
        <input type="number" id="amount" placeholder="Enter amount..." inputmode="decimal">
        <input type="text" id="note" placeholder="Enter details">
        
        <div class="edit-date-wrapper" id="date-field-block">
            <label for="edit-date">Transaction Date:</label>
            <input type="date" id="edit-date">
        </div>
        
        <div class="category-picker" id="category-picker"></div>
        
        <button class="btn-save" id="btn-save-main" onclick="handleSubmit()">Save Record</button>
    </div>

    <div class="card">
        <h2>Trip Expense History</h2>
        <div class="list-container" id="history-list"></div>
    </div>

    <div style="padding: 0 2px;">
        <button class="btn-backup" onclick="exportToCSV()">Backup Trip Data</button>
    </div>

    <script>
        /***************************************************************************
         * 📢 【開發者備忘錄：下次如何快速換成其他國家貨幣？】
         * * 如果這份網頁以後要改成「歐元版」或「日幣版」，請直接搜尋並修改以下對應參數：
         * * 1. 換資料庫名稱 (避免和舊行程撞車) -> 修改下方的 DATA_FILE 字串
         * 2. 換預設匯率 -> 修改下方的 globalFxRate 數值
         * 3. 換 HTML 版面符號 -> 請到上方 HTML 代碼中，搜尋「฿」並全部替換掉（如改為 €, $, ₩, ¥）
         * 4. 特別注意 (日幣專用) -> 本程式的算法是 [外幣 * 匯率 = 港幣] (適合泰銖、美金、歐元等)。
         * 如果你要換成「日圓」，請到下方的 renderRecords() 與 exportToCSV() 內，
         * 把 (r.amount * globalFxRate) 後面加上「 / 100 」，因為日幣習慣以百位數計算。
         ***************************************************************************/

        // ==========================================
        // 核心設定參數 (可自行修改)
        // ==========================================

        /**
         * 1. 儲存的檔案名稱 (本地瀏覽器沙盒沙箱名稱)
         * 如果更換新的行程，建議修改此名稱（例如改成 'travel_japan_v1.json'），以防止新舊行程的歷史數據重疊。
         */
        const DATA_FILE = "travel_thb_records_v2.json";[cite: 2]

        /**
         * 2. 預設初始匯率
         * 當使用者第一次打開網頁、且還沒有在輸入框手動更改匯率時，系統會默認使用這個數值。
         * 公式基準：1 單位外幣 = X 港幣 (例如 1 THB = 0.22 HKD)
         */
        let globalFxRate = 0.22;[cite: 2]
        
        /**
         * 3. 行程記帳分類清單
         * 您可以自由增減此陣列中的分類項目或修改圖示。
         * 格式必須為： "圖示[空格]分類英文名稱" (例如: "🍱 Dining")。
         */
        let categories = [[cite: 2]
            "✈️ Flights", 
            "🏨 Stay", 
            "🍱 Dining", 
            "🛍️ Shopping", 
            "🎟️ Tickets", 
            "🚌 Transport",
            "🛡️ Insurance"
        ];[cite: 2]

        /**
         * 4. 判斷是否為「港幣直入」模式的分類
         * 這裡精準指定哪些分類在記帳時，輸入的金額要被直接當作「港幣 (HKD)」處理。
         * 預設為機票、酒店與保險，其餘消費皆預設為泰銖 (THB)。
         * 如果您想增加其他直入港幣的項目（例如 🛍️ Shopping 也想直接打港幣），
         * 請在後面加上 `|| catName === "🛍️ Shopping"` 即可。
         */
        function checkIsHkdMode(catName) {[cite: 2]
            return catName === "✈️ Flights" || catName === "🏨 Stay" || catName === "🛡️ Insurance";[cite: 2]
        }

        /**
         * 5. 預設的記帳預填初始日期
         * 當全新添加一筆消費、且沒有設定日期時，系統防錯機制的保底日期。
         * 預設格式為 "YYYY-MM-DD" 的字串。
         */
        const DEFAULT_FALLBACK_DATE = "2026-06-01";


        // ==========================================
        // 系統內部運行變數 (不建議修改)
        // ==========================================
        let records = [];           // 儲存所有記帳紀錄的陣列[cite: 2]
        let selectedCategory = "";  // 當前畫面上被選中的分類名稱[cite: 2]
        let editingRecordId = null; // 當前正在編輯中的紀錄 ID（如果是新增狀態則為 null）[cite: 2]


        // ==========================================
        // 程式核心邏輯
        // ==========================================

        async function init() {[cite: 2]
            if(categories.length > 0) selectedCategory = categories[0];[cite: 2]
            setTodayDate();[cite: 2]
            
            const savedRate = localStorage.getItem('thb_fx_rate');[cite: 2]
            if(savedRate) {[cite: 2]
                globalFxRate = parseFloat(savedRate);[cite: 2]
                document.getElementById('fx-rate').value = globalFxRate;[cite: 2]
            }[cite: 2]

            await loadRecords();     [cite: 2]
            renderCategories();   [cite: 2]
            renderRecords();      [cite: 2]
        }[cite: 2]

        // 自動將日期輸入框設定為今天
        function setTodayDate() {[cite: 2]
            const now = new Date();[cite: 2]
            document.getElementById('edit-date').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;[cite: 2]
        }[cite: 2]

        // 處理手動修改匯率的事件
        function handleRateChange() {[cite: 2]
            const rateInput = document.getElementById('fx-rate');[cite: 2]
            let val = parseFloat(rateInput.value);[cite: 2]
            if(isNaN(val) || val <= 0) val = 0.22;[cite: 2]
            globalFxRate = val;[cite: 2]
            localStorage.setItem('thb_fx_rate', globalFxRate);[cite: 2]
            alert(`匯率已成功修改！目前設定為 1 THB = ${globalFxRate} HKD`);[cite: 2]
            renderRecords(); [cite: 2]
        }[cite: 2]

        // 從瀏覽器沙盒/本地緩存讀取歷史數據
        async function loadRecords() {[cite: 2]
            try {
                const root = await navigator.storage.getDirectory(); [cite: 2]
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });[cite: 2]
                const file = await fileHandle.getFile();[cite: 2]
                const text = await file.text();[cite: 2]
                records = text ? JSON.parse(text) : [];[cite: 2]
            } catch (e) {
                records = JSON.parse(localStorage.getItem('thb_rec_v2')) || [];[cite: 2]
            }
        }[cite: 2]

        // 儲存數據至本地
        async function saveRecords() {[cite: 2]
            try {
                const root = await navigator.storage.getDirectory();[cite: 2]
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });[cite: 2]
                const writable = await fileHandle.createWritable();[cite: 2]
                await writable.write(JSON.stringify(records));[cite: 2]
                await writable.close();[cite: 2]
            } catch (e) {
                localStorage.setItem('thb_rec_v2', JSON.stringify(records));[cite: 2]
            }
        }[cite: 2]

        // 渲染分類按鈕
        function renderCategories() {[cite: 2]
            const picker = document.getElementById('category-picker');[cite: 2]
            picker.innerHTML = ''; [cite: 2]
            
            categories.forEach(cat => {[cite: 2]
                const isActive = (cat === selectedCategory) ? 'active' : '';[cite: 2]
                const parts = cat.split(' ');[cite: 2]
                const icon = parts[0];[cite: 2]
                const label = parts.slice(1).join(' ');[cite: 2]

                picker.innerHTML += `
                    <button type="button" class="category-btn ${isActive}" onclick="selectCategory('${cat}', this)">
                        <span class="icon-label">${icon}</span>
                        <span class="label">${label}</span>
                    </button>
                `;[cite: 2]
            });[cite: 2]
            
            updatePlaceholder(selectedCategory);[cite: 2]
        }[cite: 2]

        // 切換選中的分類
        function selectCategory(cat, btn) {[cite: 2]
            selectedCategory = cat;  [cite: 2]
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); [cite: 2]
            btn.classList.add('active'); [cite: 2]
            updatePlaceholder(cat);[cite: 2]
        }[cite: 2]

        // 動態根據是否為港幣模式，更新輸入框的 Placeholder 提示
        function updatePlaceholder(cat) {[cite: 2]
            const amtInput = document.getElementById('amount');[cite: 2]
            if (checkIsHkdMode(cat)) {[cite: 2]
                amtInput.placeholder = "Enter amount in HKD";[cite: 2]
            } else {[cite: 2]
                amtInput.placeholder = "Enter amount in THB";[cite: 2]
            }[cite: 2]
        }[cite: 2]

        // 儲存/更新單筆紀錄的送出邏輯
        async function handleSubmit() {[cite: 2]
            const amountInput = document.getElementById('amount');[cite: 2]
            const noteInput = document.getElementById('note'); [cite: 2]
            const dateInput = document.getElementById('edit-date');[cite: 2]
            
            let inputAmount = parseFloat(amountInput.value);[cite: 2]
            const note = noteInput.value.trim(); [cite: 2]

            if (isNaN(inputAmount) || inputAmount <= 0) return alert('請輸入正確且大於 0 的金額！');[cite: 2]
            
            let targetDate = dateInput.value || DEFAULT_FALLBACK_DATE;[cite: 2]

            let finalThbAmount = inputAmount;[cite: 2]
            let isHkdMode = checkIsHkdMode(selectedCategory);[cite: 2]

            if (isHkdMode) {[cite: 2]
                // 港幣直入：系統自動判定將「輸入的港幣金額 / 當下匯率」精準換算為外幣存入
                finalThbAmount = Math.round(inputAmount / globalFxRate);[cite: 2]
            }[cite: 2]

            if (editingRecordId !== null) {[cite: 2]
                const recordIndex = records.findIndex(r => r.id === editingRecordId);[cite: 2]
                if(recordIndex !== -1) {[cite: 2]
                    records[recordIndex].amount = finalThbAmount;[cite: 2]
                    records[recordIndex].category = selectedCategory;[cite: 2]
                    records[recordIndex].note = note; [cite: 2]
                    records[recordIndex].date = targetDate;[cite: 2]
                    records[recordIndex].wasHkdInput = isHkdMode ? inputAmount : null; [cite: 2]
                }[cite: 2]
                editingRecordId = null;[cite: 2]
                document.getElementById('form-title').innerText = "Add Travel Record";[cite: 2]
                document.getElementById('btn-save-main').innerText = "Save Record";[cite: 2]
                document.getElementById('btn-save-main').style.backgroundColor = "var(--primary)";[cite: 2]
                document.getElementById('edit-indicator').style.display = "none"; [cite: 2]
            } else {[cite: 2]
                const newRecord = {[cite: 2]
                    id: Date.now(), [cite: 2]
                    amount: finalThbAmount,[cite: 2]
                    category: selectedCategory,[cite: 2]
                    note: note, [cite: 2]
                    date: targetDate,[cite: 2]
                    wasHkdInput: isHkdMode ? inputAmount : null [cite: 2]
                };[cite: 2]
                records.unshift(newRecord);[cite: 2]
            }[cite: 2]

            records.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);[cite: 2]
            await saveRecords();     [cite: 2]
            amountInput.value = '';  [cite: 2]
            noteInput.value = '';  [cite: 2]
            setTodayDate(); [cite: 2]
            renderRecords();         [cite: 2]
        }[cite: 2]

        // 啟動點擊編輯模式
        function startEdit(id) {[cite: 2]
            const record = records.find(r => r.id === id);[cite: 2]
            if(!record) return;[cite: 2]

            editingRecordId = id; [cite: 2]
            
            if (record.wasHkdInput) {[cite: 2]
                document.getElementById('amount').value = record.wasHkdInput;[cite: 2]
            } else {[cite: 2]
                document.getElementById('amount').value = record.amount;[cite: 2]
            }[cite: 2]
            
            document.getElementById('note').value = record.note || ''; [cite: 2]
            document.getElementById('edit-date').value = record.date; [cite: 2]
            selectedCategory = record.category;[cite: 2]
            
            document.getElementById('form-title').innerText = "Edit Trip Record";[cite: 2]
            document.getElementById('btn-save-main').innerText = "Update Record";[cite: 2]
            document.getElementById('btn-save-main').style.backgroundColor = "var(--warning)";[cite: 2]
            document.getElementById('edit-indicator').style.display = "block";[cite: 2]
            
            renderCategories(); [cite: 2]
            window.scrollTo({ top: 0, behavior: 'smooth' });[cite: 2]
        }[cite: 2]

        // 刪除單筆紀錄
        async function deleteRecord(id) {[cite: 2]
            if (confirm("確認要刪除此筆記帳紀錄嗎？")) {[cite: 2]
                records = records.filter(r => r.id !== id);[cite: 2]
                await saveRecords(); [cite: 2]
                renderRecords();     [cite: 2]
            }[cite: 2]
        }[cite: 2]

        // 根據不同分類，動態取得前端歷史列表標籤（Tag）的 CSS 樣式組
        function getHighlightStyle(category) {[cite: 2]
            if (category.includes("Flights")) return "background-color: var(--hl-flights); color: var(--hl-flights-txt);";[cite: 2]
            if (category.includes("Stay")) return "background-color: var(--hl-stay); color: var(--hl-stay-txt);";[cite: 2]
            if (category.includes("Dining")) return "background-color: var(--hl-dining); color: var(--hl-dining-txt);";[cite: 2]
            if (category.includes("Shopping")) return "background-color: var(--hl-shopping); color: var(--hl-shopping-txt);";[cite: 2]
            if (category.includes("Tickets")) return "background-color: var(--hl-tickets); color: var(--hl-tickets-txt);";[cite: 2]
            if (category.includes("Transport")) return "background-color: var(--hl-trans); color: var(--hl-trans-txt);";[cite: 2]
            if (category.includes("Insurance")) return "background-color: var(--hl-insurance); color: var(--hl-insurance-txt);";[cite: 2]
            return "background-color: var(--grey); color: var(--text);";[cite: 2]
        }[cite: 2]

        // 計算總額並渲染整個記帳歷史列表
        function renderRecords() {[cite: 2]
            const listContainer = document.getElementById('history-list');[cite: 2]
            const totalContainer = document.getElementById('total');[cite: 2]
            const totalHkdContainer = document.getElementById('total-hkd');[cite: 2]
            const catTotalsContainer = document.getElementById('category-totals-container');[cite: 2]
            
            listContainer.innerHTML = ''; [cite: 2]
            catTotalsContainer.innerHTML = '';[cite: 2]
            
            let totalThb = 0;[cite: 2]
            let totalHkd = 0;[cite: 2]
            let catSumsThb = {};[cite: 2]
            categories.forEach(cat => { catSumsThb[cat] = 0; });[cite: 2]

            if (records.length === 0) {[cite: 2]
                listContainer.innerHTML = `<div style="color: #bbb; text-align: center; padding: 20px; font-size: 0.9rem;">No trip transactions yet.</div>`;[cite: 2]
                totalContainer.innerText = '0';[cite: 2]
                totalHkdContainer.innerText = '0';[cite: 2]
                categories.forEach(cat => {[cite: 2]
                    catTotalsContainer.innerHTML += `<div class="cat-total-item"><span class="cat-name">${cat.split(' ').slice(1).join(' ')}</span><span class="cat-num">฿0</span></div>`;[cite: 2]
                });[cite: 2]
                return;[cite: 2]
            }[cite: 2]

            records.forEach(r => {[cite: 2]
                let currentItemHkd = 0;[cite: 2]
                let currentItemThb = r.amount;[cite: 2]

                if (checkIsHkdMode(r.category) && r.wasHkdInput) {[cite: 2]
                    currentItemHkd = r.wasHkdInput; [cite: 2]
                } else {[cite: 2]
                    currentItemHkd = Math.round(r.amount * globalFxRate); [cite: 2]
                }[cite: 2]

                totalThb += currentItemThb;[cite: 2]
                totalHkd += currentItemHkd;[cite: 2]
                
                if (catSumsThb[r.category] !== undefined) {[cite: 2]
                    catSumsThb[r.category] += currentItemThb;[cite: 2]
                }[cite: 2]

                const noteHTML = r.note ? `<span class="note-text">${r.note}</span>` : '';[cite: 2]
                const colorStyle = getHighlightStyle(r.category);[cite: 2]
                const displayCategoryLabel = r.category.split(' ').slice(1).join(' ');[cite: 2]

                listContainer.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <span class="tag" style="${colorStyle}">${displayCategoryLabel}</span>
                            <div class="item-details">
                                <span>${r.date}</span>
                                ${noteHTML}
                            </div>
                        </div>
                        <div class="item-right">
                            <div class="amount-zone">
                                <span class="amount">฿${currentItemThb.toLocaleString()}</span>
                                <span class="amount-hkd">HK$${currentItemHkd.toLocaleString()}</span>
                            </div>
                            <button class="btn-action" onclick="startEdit(${r.id})">✏️</button>
                            <button class="btn-action" onclick="deleteRecord(${r.id})">🗑️</button>
                        </div>
                    </div>
                `;[cite: 2]
            });[cite: 2]

            totalContainer.innerText = totalThb.toLocaleString();[cite: 2]
            totalHkdContainer.innerText = totalHkd.toLocaleString();[cite: 2]

            Object.keys(catSumsThb).forEach(cat => {[cite: 2]
                catTotalsContainer.innerHTML += `
                    <div class="cat-total-item">
                        <span class="cat-name">${cat.split(' ').slice(1).join(' ')}</span>
                        <span class="cat-num">฿${catSumsThb[cat].toLocaleString()}</span>
                    </div>
                `;[cite: 2]
            });[cite: 2]
        }[cite: 2]

        // CSV 智慧匯出邏輯
        function exportToCSV() {[cite: 2]
            if (records.length === 0) return alert("目前沒有可匯出的數據！");[cite: 2]
            let sortedRecords = [...records].sort((a, b) => a.date.localeCompare(b.date) || a.id - b.id);[cite: 2]
            let csvContent = "\uFEFFDate,Category,Amount(THB),HKD(Est),Notes\n"; [cite: 2]
            
            let lastIsoDate = "";[cite: 2]
            let dayTotalThb = 0, dayTotalHkd = 0; [cite: 2]
            let tripTotalThb = 0, tripTotalHkd = 0; [cite: 2]

            for (let i = 0; i < sortedRecords.length; i++) {[cite: 2]
                const r = sortedRecords[i];[cite: 2]
                const nextRecord = sortedRecords[i + 1];[cite: 2]

                const currentIsoDate = r.date;[cite: 2]
                let nextIsoDate = nextRecord ? nextRecord.date : null;[cite: 2]

                const rawCategory = r.category.split(' ').slice(1).join(' ');[cite: 2]
                const category = rawCategory.includes(',') ? `"${rawCategory}"` : rawCategory;[cite: 2]
                const note = r.note && r.note.includes(',') ? `"${r.note}"` : (r.note || '');[cite: 2]
                
                let currentItemHkd = r.wasHkdInput ? r.wasHkdInput : Math.round(r.amount * globalFxRate);[cite: 2]
                let currentItemThb = r.amount;[cite: 2]

                let displayDate = (currentIsoDate !== lastIsoDate) ? currentIsoDate : "";[cite: 2]
                if(displayDate) lastIsoDate = currentIsoDate;[cite: 2]
                
                csvContent += `${displayDate},${category},฿${currentItemThb},HK$${currentItemHkd},${note}\n`;[cite: 2]

                if (!checkIsHkdMode(r.category)) {[cite: 2]
                    dayTotalThb += currentItemThb;[cite: 2]
                    dayTotalHkd += currentItemHkd;[cite: 2]
                }[cite: 2]

                tripTotalThb += currentItemThb;[cite: 2]
                tripTotalHkd += currentItemHkd;[cite: 2]

                if (!nextRecord || nextIsoDate !== currentIsoDate) {[cite: 2]
                    if (dayTotalThb > 0) {[cite: 2]
                        csvContent += `,Daily Total,฿${dayTotalThb},HK$${dayTotalHkd},\n`;[cite: 2]
                    }[cite: 2]
                    dayTotalThb = 0; [cite: 2]
                    dayTotalHkd = 0;[cite: 2]
                }[cite: 2]
                
                if (!nextRecord) {[cite: 2]
                    csvContent += `,Trip Total,฿${tripTotalThb},HK$${tripTotalHkd},\n`;[cite: 2]
                }[cite: 2]
            }[cite: 2]
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });[cite: 2]
            const url = URL.createObjectURL(blob);[cite: 2]
            const link = document.createElement("a");[cite: 2]
            link.setAttribute("href", url);[cite: 2]
            link.setAttribute("download", `Trip_Budget_Report_${new Date().toISOString().slice(0,10)}.csv`);[cite: 2]
            document.body.appendChild(link);[cite: 2]
            link.click();[cite: 2]
            document.body.removeChild(link);[cite: 2]
        }[cite: 2]

        init();[cite: 2]
    </script>
