<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimalist Travel Budget Pro v7.4 (THB/HKD Dual)</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Thai Budget">

    <style>
        /* 全域變數（顏色主題） */
        :root {
            --bg-color: #f0f4f8;   
            --card-bg: #ffffff;    
            --primary: #1abc9c;    
            --danger: #ff4d4f;     
            --success: #2ecc71;    
            --warning: #e67e22;    
            --text: #333333;       
            --grey: #e1e4e8;       
            
            /* Highlight 顏色背景 */
            --hl-hkd: #f4f6f7;     /* 港幣直入專用：灰色 */
            --hl-hkd-txt: #7f8c8d;
            --hl-flights: #e8f4fd; 
            --hl-flights-txt: #2980b9;
            --hl-stay: #fef5e7;    
            --hl-stay-txt: #d35400;
            --hl-dining: #fdebd0;  
            --hl-dining-txt: #e67e22;
            --hl-shopping: #f5eef8;
            --hl-shopping-txt: #8e44ad;
            --hl-tickets: #e8f8f5; 
            --hl-tickets-txt: #16a085;
            --hl-trans: #ebf5fb;   
            --hl-trans-txt: #566573;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px; 
            padding-top: 0; 
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 14px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 10px;
        }
        
        .top-sticky-card {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            margin-left: -10px;
            margin-right: -10px;
            margin-bottom: 12px;
            padding: 15px 12px;
            background: linear-gradient(135deg, #ffffff 0%, #f7f9fa 100%);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        
        h2 { margin-top: 0; font-size: 0.9rem; color: #777; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        
        .dashboard-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .total-box {
            flex: 1.1;
            padding-left: 10px; 
            text-align: left;
        }
        .total-amount { 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: var(--primary); 
            margin-top: 2px;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        .total-hkd-sub {
            font-size: 0.8rem;
            color: #888;
            font-weight: 600;
            margin-top: 2px;
        }
        
        .category-totals-box {
            flex: 1.3;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            background: rgba(0, 0, 0, 0.02);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.01);
        }
        
        .cat-total-item {
            display: flex;
            flex-direction: column;
            font-size: 0.75rem;
            color: #555;
        }
        .cat-total-item .cat-name {
            color: #888;
            font-size: 0.7rem;
        }
        .cat-total-item .cat-num {
            font-weight: 700;
            color: #222;
        }
        
        /* 匯率調整區欄位 */
        .fx-rate-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e8f8f5;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #16a085;
        }
        .fx-rate-box input {
            width: 80px;
            padding: 4px 8px;
            margin: 0;
            border-radius: 6px;
            border: 1px solid #a3e4d7;
            text-align: center;
            font-size: 0.85rem;
        }

        input[type="number"], input[type="text"], input[type="date"] {
            width: 100%;
            padding: 10px 12px; 
            margin: 4px 0;      
            border-radius: 8px;
            border: 1px solid var(--grey);
            box-sizing: border-box;
            font-size: 0.95rem;
            -webkit-appearance: none; 
        }
        input:focus { outline: none; border-color: var(--primary); } 
        
        .edit-date-wrapper {
            background: #fafbfc;
            padding: 2px 0;
            margin: 4px 0;
        }
        .edit-date-wrapper label {
            font-size: 0.75rem;
            color: #666;
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }
        
        button {
            width: 100%;
            padding: 11px;
            margin: 4px 0;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.2s;
            -webkit-appearance: none;
            cursor: pointer;
        }
        button:active { opacity: 0.8; } 
        
        .btn-save { background-color: var(--primary); color: white; margin-top: 6px; }
        .btn-backup { background-color: #566573; color: white; margin-top: 6px; }
        
        .category-picker {
            display: flex;
            flex-wrap: wrap; 
            gap: 6px;       
            margin: 8px 0;
        }
        
        .category-btn {
            flex: 1 1 calc(33.33% - 6px); 
            background-color: var(--card-bg);
            color: var(--text);
            border: 1.5px solid var(--grey);
            border-radius: 10px;
            padding: 8px 2px; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 2px;
            margin: 0;
        }
        .category-btn .icon-label { font-size: 1.05rem; } 
        .category-btn .label { font-size: 0.75rem; font-weight: bold; } 
        
        .category-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .edit-mode-indicator {
            display: none; 
            background-color: #f39c12;
            color: white;
            padding: 6px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .list-container { max-height: 280px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f2f5; }
        .list-item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        
        .tag { 
            padding: 3px 8px; 
            border-radius: 5px; 
            font-size: 0.78rem; 
            font-weight: bold; 
            align-self: flex-start; 
        }
        
        .item-details { color: #aaa; font-size: 0.72rem; margin-top: 4px; display: flex; gap: 6px; align-items: center; }
        .note-text { color: #555; font-weight: 500; background: #fffbe6; padding: 1px 4px; border-radius: 4px; border: 1px solid #ffe58f; } 

        .item-right { display: flex; align-items: center; gap: 4px; }
        .amount-zone { display: flex; flex-direction: column; text-align: right; margin-right: 4px; }
        .amount { font-weight: 700; font-size: 0.95rem; color: #222; }
        .amount-hkd { font-size: 0.72rem; color: #888; font-weight: 500; }
        
        .btn-action { background: none; padding: 4px; margin: 0; width: auto; font-size: 0.9rem; display: inline-block;}
        
        @media (min-width: 400px) { .category-btn { flex: 1 1 calc(25% - 6px); } }
    </style>
</head>
<body>

    <div class="card top-sticky-card">
        <div class="dashboard-layout">
            <div class="total-box">
                <h2>Total Expenses</h2>
                <div class="total-amount">฿<span id="total">0</span></div>
                <div class="total-hkd-sub">≈ HK$ <span id="total-hkd">0</span></div>
            </div>
            <div class="category-totals-box" id="category-totals-container"></div>
        </div>
    </div>

    <div class="fx-rate-box">
        <span>Exchange Rate: 1 THB =</span>
        <input type="number" id="fx-rate" value="0.22" step="0.001" onchange="handleRateChange()" inputmode="decimal">
        <span>HKD</span>
    </div>

    <div class="card">
        <h2 id="form-title">Add Travel Record</h2>
        
        <div id="edit-indicator" class="edit-mode-indicator">✏️ Editing trip record... (will overwrite on save)</div>
        
        <input type="number" id="amount" placeholder="Enter amount..." inputmode="decimal">
        <input type="text" id="note" placeholder="Enter details (e.g., Bought in HKD, Massage)">
        
        <div class="edit-date-wrapper" id="date-field-block">
            <label for="edit-date">Transaction Date:</label>
            <input type="date" id="edit-date">
        </div>
        
        <div class="category-picker" id="category-picker"></div>
        
        <button class="btn-save" id="btn-save-main" onclick="handleSubmit()">Save Record</button>
    </div>

    <div class="card">
        <h2>Trip Expense History</h2>
        <div class="list-container" id="history-list"></div>
    </div>

    <div style="padding: 0 2px;">
        <button class="btn-backup" onclick="exportToCSV()">Backup Trip Data (Excel CSV)</button>
    </div>

    <script>
        /***************************************************************************
         * 📢 【開發者備忘錄：下次如何快速換成其他國家貨幣？】
         * * 1. 換資料庫名稱 (避免和舊行程撞車) -> 修改下方的 DATA_FILE 字串
         * 2. 換預設匯率 -> 修改下方的 globalFxRate 數值
         * 3. 換 HTML 版面符號 -> 請到上方 HTML 代碼中，搜尋「฿」並全部替換掉
         * 4. 雙幣直入標籤說明 -> 當分類名稱結尾含有「(HKD)」時，
         * 程式會聰明地把輸入的金額直接當成港幣處理，並自動反推外幣。
         ***************************************************************************/

        const DATA_FILE = "travel_thb_records_v2.json"; // 升級 v2 檔名
        
        let globalFxRate = 0.22; // 預設 1 泰銖 = 0.22 港幣
        
        // 旅遊專屬八大分類（內含兩個直入港幣分類）
        let categories = [
            "✈️ Flights", 
            "💳 Stay", 
            "🍱 Dining", 
            "🛍️ Shopping", 
            "🎟️ Tickets", 
            "🚌 Transport"
        ];
        
        let records = [];           
        let selectedCategory = "";  
        let editingRecordId = null; 

        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        // 初始化
        async function init() {
            if(categories.length > 0) selectedCategory = categories[0];
            
            setTodayDate();
            
            // 監聽輸入框，根據選到的分類動態更換 Placeholder 提示字
            document.getElementById('amount').placeholder = `Enter amount in HKD`;

            const savedRate = localStorage.getItem('thb_fx_rate');
            if(savedRate) {
                globalFxRate = parseFloat(savedRate);
                document.getElementById('fx-rate').value = globalFxRate;
            }

            await loadRecords();     
            renderCategories();   
            renderRecords();      
        }

        function setTodayDate() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            document.getElementById('edit-date').value = `${yyyy}-${mm}-${dd}`;
        }

        function handleRateChange() {
            const rateInput = document.getElementById('fx-rate');
            let val = parseFloat(rateInput.value);
            if(isNaN(val) || val <= 0) val = 0.22;
            globalFxRate = val;
            localStorage.setItem('thb_fx_rate', globalFxRate);
            renderRecords(); 
        }

        async function loadRecords() {
            try {
                const root = await navigator.storage.getDirectory(); 
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const file = await fileHandle.getFile();
                const text = await file.text();
                records = text ? JSON.parse(text) : [];
            } catch (e) {
                console.error("OPFS 讀取失敗:", e);
                records = JSON.parse(localStorage.getItem('thb_rec_v2')) || [];
            }
        }

        async function saveRecords() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(records));
                await writable.close();
            } catch (e) {
                console.error("OPFS 寫入失敗:", e);
                localStorage.setItem('thb_rec_v2', JSON.stringify(records));
            }
        }

        function renderCategories() {
            const picker = document.getElementById('category-picker');
            picker.innerHTML = ''; 
            
            categories.forEach(cat => {
                const isActive = (cat === selectedCategory) ? 'active' : '';
                const parts = cat.split(' ');
                const icon = parts.length > 1 ? parts[0] : '📝';
                const label = parts.length > 1 ? parts.slice(1).join(' ') : cat;

                picker.innerHTML += `
                    <button type="button" class="category-btn ${isActive}" onclick="selectCategory('${cat}', this)">
                        <span class="icon-label">${icon}</span>
                        <span class="label">${label}</span>
                    </button>
                `;
            });
        }

        function selectCategory(cat, btn) {
            selectedCategory = cat; 
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 

            // 動態更換輸入框的貨幣單位提示
            const amtInput = document.getElementById('amount');
            if (cat.includes("(HKD)")) {
                amtInput.placeholder = "Enter amount in HKD (港幣直入)";
            } else {
                amtInput.placeholder = "Enter amount in THB (泰銖 ฿)";
            }
        }

        async function handleSubmit() {
            const amountInput = document.getElementById('amount');
            const noteInput = document.getElementById('note'); 
            const dateInput = document.getElementById('edit-date');
            
            let inputAmount = parseFloat(amountInput.value);
            const note = noteInput.value.trim(); 

            if (isNaN(inputAmount) || inputAmount <= 0) return alert('Please enter a valid amount!');
            
            let targetDate = dateInput.value;
            if(!targetDate) {
                const now = new Date();
                targetDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            }

            // 新版資料核心：如果使用者選取的是港幣 Direct，存檔時將金額欄位轉換為對應外幣儲存，以便數據一致
            let finalThbAmount = inputAmount;
            let isHkdMode = selectedCategory.includes("(HKD)");

            if (isHkdMode) {
                // 如果是直接輸入港幣（如機票付 3000），反向推算回泰銖儲存 = 3000 / 0.22
                finalThbAmount = Math.round(inputAmount / globalFxRate);
            }

            if (editingRecordId !== null) {
                const recordIndex = records.findIndex(r => r.id === editingRecordId);
                if(recordIndex !== -1) {
                    records[recordIndex].amount = finalThbAmount;
                    records[recordIndex].category = selectedCategory;
                    records[recordIndex].note = note; 
                    records[recordIndex].date = targetDate;
                    records[recordIndex].wasHkdInput = isHkdMode ? inputAmount : null; // 紀錄原始港幣
                }
                
                records.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
                
                editingRecordId = null;
                document.getElementById('form-title').innerText = "Add Travel Record";
                document.getElementById('btn-save-main').innerText = "Save Record";
                document.getElementById('btn-save-main').style.backgroundColor = "var(--primary)";
                document.getElementById('edit-indicator').style.display = "none"; 
            } else {
                const newRecord = {
                    id: Date.now(), 
                    amount: finalThbAmount,
                    category: selectedCategory,
                    note: note, 
                    date: targetDate,
                    wasHkdInput: isHkdMode ? inputAmount : null 
                };
                records.unshift(newRecord);
                records.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
            }

            await saveRecords();     
            amountInput.value = '';  
            noteInput.value = '';  
            setTodayDate(); 
            renderRecords();         
        }

        function startEdit(id) {
            const record = records.find(r => r.id === id);
            if(!record) return;

            editingRecordId = id; 
            
            // 如果當初是用港幣直入的，點擊編輯時還原成當初輸入的港幣數字
            if (record.wasHkdInput) {
                document.getElementById('amount').value = record.wasHkdInput;
            } else {
                document.getElementById('amount').value = record.amount;
            }
            
            document.getElementById('note').value = record.note || ''; 
            document.getElementById('edit-date').value = ensureISODate(record.date); 
            selectedCategory = record.category;
            
            document.getElementById('form-title').innerText = "Edit Trip Record";
            document.getElementById('btn-save-main').innerText = "Update Record";
            document.getElementById('btn-save-main').style.backgroundColor = "var(--warning)";
            document.getElementById('edit-indicator').style.display = "block";
            
            renderCategories(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRecord(id) {
            if (confirm("Are you sure you want to delete this record?")) {
                records = records.filter(r => r.id !== id);
                await saveRecords(); 
                renderRecords();     
            }
        }

        function getHighlightStyle(category) {
            const catStr = String(category);
            if (catStr.includes("(HKD)")) {
                return "background-color: var(--hl-hkd); color: var(--hl-hkd-txt);";
            } else if (catStr.includes("Flights")) {
                return "background-color: var(--hl-flights); color: var(--hl-flights-txt);";
            } else if (catStr.includes("Stay")) {
                return "background-color: var(--hl-stay); color: var(--hl-stay-txt);";
            } else if (catStr.includes("Dining")) {
                return "background-color: var(--hl-dining); color: var(--hl-dining-txt);";
            } else if (catStr.includes("Shopping")) {
                return "background-color: var(--hl-shopping); color: var(--hl-shopping-txt);";
            } else if (catStr.includes("Tickets")) {
                return "background-color: var(--hl-tickets); color: var(--hl-tickets-txt);";
            } else {
                return "background-color: var(--hl-trans); color: var(--hl-trans-txt);";
            }
        }

        function renderRecords() {
            const listContainer = document.getElementById('history-list');
            const totalContainer = document.getElementById('total');
            const totalHkdContainer = document.getElementById('total-hkd');
            const catTotalsContainer = document.getElementById('category-totals-container');
            
            listContainer.innerHTML = ''; 
            catTotalsContainer.innerHTML = '';
            
            let totalThb = 0;
            let totalHkd = 0;
            
            let catSumsThb = {};
            categories.forEach(cat => { catSumsThb[cat] = 0; });

            if (records.length === 0) {
                listContainer.innerHTML = `<div style="color: #bbb; text-align: center; padding: 20px; font-size: 0.9rem;">No trip transactions yet.</div>`;
                totalContainer.innerText = '0';
                totalHkdContainer.innerText = '0';
                
                categories.forEach(cat => {
                    const cleanLabel = cat.split(' ').slice(1).join(' ') || cat;
                    catTotalsContainer.innerHTML += `
                        <div class="cat-total-item">
                            <span class="cat-name">${cleanLabel}</span>
                            <span class="cat-num">฿0</span>
                        </div>`;
                });
                return;
            }

            records.forEach(r => {
                let currentItemHkd = 0;
                let currentItemThb = r.amount;

                // 智慧雙向算式判斷
                if (r.category.includes("(HKD)") && r.wasHkdInput) {
                    currentItemHkd = r.wasHkdInput; // 港幣直取當初輸入值
                } else {
                    currentItemHkd = Math.round(r.amount * globalFxRate); // 泰銖轉港幣
                }

                totalThb += currentItemThb;
                totalHkd += currentItemHkd;
                
                if (catSumsThb[r.category] !== undefined) {
                    catSumsThb[r.category] += currentItemThb;
                }

                const noteHTML = r.note ? `<span class="note-text">${r.note}</span>` : '';
                const colorStyle = getHighlightStyle(r.category);
                const displayCategoryLabel = r.category.split(' ').slice(1).join(' ') || r.category;

                listContainer.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <span class="tag" style="${colorStyle}">${displayCategoryLabel}</span>
                            <div class="item-details">
                                <span>${r.date}</span>
                                ${noteHTML}
                            </div>
                        </div>
                        <div class="item-right">
                            <div class="amount-zone">
                                <span class="amount">฿${currentItemThb.toLocaleString()}</span>
                                <span class="amount-hkd">HK$${currentItemHkd.toLocaleString()}</span>
                            </div>
                            <button class="btn-action" onclick="startEdit(${r.id})">✏️</button>
                            <button class="btn-action" onclick="deleteRecord(${r.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });

            // 頂部看板更新
            totalContainer.innerText = totalThb.toLocaleString();
            totalHkdContainer.innerText = totalHkd.toLocaleString();

            // 渲染右側分類統計
            Object.keys(catSumsThb).forEach(cat => {
                const cleanLabel = cat.split(' ').slice(1).join(' ') || cat;
                catTotalsContainer.innerHTML += `
                    <div class="cat-total-item">
                        <span class="cat-name">${cleanLabel}</span>
                        <span class="cat-num">฿${catSumsThb[cat].toLocaleString()}</span>
                    </div>
                `;
            });
        }

        function ensureISODate(dateStr) {
            if (dateStr && dateStr.includes('-') && dateStr.split('-').length === 3) {
                return dateStr;
            }
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return "2026-06-01"; 
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            } catch(e) {
                return "2026-06-01";
            }
        }

        function exportToCSV() {
            if (records.length === 0) return alert("There is no data to export yet!");
            
            let sortedRecords = [...records].sort((a, b) => a.date.localeCompare(b.date) || a.id - b.id);
            let csvContent = "\uFEFFDate,Category,Amount(THB),HKD(Est),Notes\n"; 
            
            let lastIsoDate = "";
            let dayTotalThb = 0;
            let dayTotalHkd = 0;
            let tripTotalThb = 0;
            let tripTotalHkd = 0;

            for (let i = 0; i < sortedRecords.length; i++) {
                const r = sortedRecords[i];
                const nextRecord = sortedRecords[i + 1];

                const currentIsoDate = ensureISODate(r.date);
                let nextIsoDate = null;
                if (nextRecord) nextIsoDate = ensureISODate(nextRecord.date);

                const rawCategory = r.category.split(' ').slice(1).join(' ') || r.category;
                const category = rawCategory.includes(',') ? `"${rawCategory}"` : rawCategory;
                const note = r.note && r.note.includes(',') ? `"${r.note}"` : (r.note || '');
                
                let currentItemHkd = r.wasHkdInput ? r.wasHkdInput : Math.round(r.amount * globalFxRate);
                let currentItemThb = r.amount;

                let displayDate = (currentIsoDate !== lastIsoDate) ? currentIsoDate : "";
                if(displayDate) lastIsoDate = currentIsoDate;
                
                csvContent += `${displayDate},${category},฿${currentItemThb},HK$${currentItemHkd},${note}\n`;

                dayTotalThb += currentItemThb;
                dayTotalHkd += currentItemHkd;
                tripTotalThb += currentItemThb;
                tripTotalHkd += currentItemHkd;

                // 當日小計
                if (!nextRecord || nextIsoDate !== currentIsoDate) {
                    csvContent += `,Daily Total,฿${dayTotalThb},HK$${dayTotalHkd},\n`;
                    dayTotalThb = 0; 
                    dayTotalHkd = 0;
                }

                // 全行程總計
                if (!nextRecord) {
                    csvContent += `,Trip Total,฿${tripTotalThb},HK$${tripTotalHkd},\n`;
                }
            }
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Trip_Budget_Report_DualCurrency_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();
    </script>
</body>
</html>
